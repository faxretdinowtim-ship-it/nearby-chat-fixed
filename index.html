<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nearby Чат</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #0f0f0f;
            display: flex;
            flex-direction: column;
        }
        .login-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-screen h1 { color: white; font-size: 48px; margin-bottom: 50px; }
        .login-screen input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background: rgba(255,255,255,0.9);
            margin-bottom: 20px;
            text-align: center;
        }
        .login-screen button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .chat-screen {
            flex: 1;
            display: none;
            flex-direction: column;
            background: #1a1a2e;
        }
        .chat-header {
            background: #16213e;
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 20px;
        }
        .message-left { background: #2d2d44; color: white; align-self: flex-start; }
        .message-right { background: #667eea; color: white; align-self: flex-end; }
        .system-message { text-align: center; color: #888; font-size: 12px; margin: 10px 0; }
        .message-time { font-size: 10px; opacity: 0.6; text-align: right; margin-top: 3px; }
        .input-area {
            display: flex;
            padding: 10px;
            background: #16213e;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: #0f0f0f;
            color: white;
            font-size: 14px;
        }
        .input-area button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 25px;
            background: #667eea;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app">
        <div id="loginScreen" class="login-screen">
            <h1>🔥 Nearby</h1>
            <input type="text" id="username" placeholder="Твоё имя">
            <button onclick="joinChat()">Войти в чат</button>
        </div>
        <div id="chatScreen" class="chat-screen">
            <div class="chat-header">✨ Nearby</div>
            <div id="messages" class="messages"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
                <button id="sendBtn" disabled>📤</button>
            </div>
        </div>
    </div>
    <script>
        let socket, currentUser = '';
        const SERVER_URL = window.location.origin;

        function joinChat() {
            const username = document.getElementById('username').value.trim();
            if (!username) return alert('Введи имя');
            currentUser = username;
            localStorage.setItem('nearby_user', username);
            socket = io(SERVER_URL, { transports: ['polling', 'websocket'] });
            socket.on('connect', () => {
                socket.emit('user_joined', username);
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('chatScreen').style.display = 'flex';
                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
            });
            socket.on('history', (history) => {
                document.getElementById('messages').innerHTML = '';
                history.forEach(msg => addMessage(msg));
            });
            socket.on('message', (msg) => addMessage(msg));
        }
        function addMessage(msg) {
            const isMe = msg.username === currentUser;
            const div = document.createElement('div');
            div.className = `message ${isMe ? 'message-right' : 'message-left'}`;
            div.innerHTML = `
                ${!isMe ? `<div style="font-size:11px; opacity:0.7">${escapeHtml(msg.username)}</div>` : ''}
                <div>${escapeHtml(msg.text)}</div>
                <div class="message-time">${new Date(msg.time).toLocaleTimeString()}</div>
            `;
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView();
        }
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (text && socket) {
                socket.emit('message', { text });
                input.value = '';
            }
        }
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => e.key === 'Enter' && sendMessage();
        const saved = localStorage.getItem('nearby_user');
        if (saved) document.getElementById('username').value = saved;
    </script>
</body>
</html>
